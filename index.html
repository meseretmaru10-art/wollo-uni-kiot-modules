<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIOT Hub</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 80px; }
        .header { background: #456d80; color: white; padding: 18px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        
        /* PDF Viewer Styling */
        #pdf-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; }
        .pdf-nav { background: #456d80; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: #ff4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        iframe { width: 100%; height: calc(100% - 50px); border: none; }

        .footer { text-align: center; padding: 25px; background: #fff; border-top: 3px solid #456d80; margin-top: 30px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 65px; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #888; font-weight: bold; }
        .active-tab { color: #456d80; border-top: 4px solid #456d80; }
    </style>
</head>
<body>

<div id="app-body">
    <div class="header">Wollo University - KIOT Hub</div>

    <div id="mod-page" class="page active">
        <div class="grid">
            <div class="card" onclick="smartViewPDF('maths.pdf')">📐<br>Maths</div>
            <div class="card" onclick="smartViewPDF('cpp.pdf')">💻<br>C++</div>
            <div class="card" onclick="smartViewPDF('english2.pdf')">📖<br>English II</div>
            <div class="card" onclick="smartViewPDF('history.pdf')">⏳<br>History</div>
            <div class="card" onclick="smartViewPDF('civics.pdf')">⚖️<br>Civics</div>
            <div class="card" onclick="smartViewPDF('anthropology.pdf')">🌍<br>Anthro</div>
            <div class="card" onclick="smartViewPDF('emerging.pdf')">🚀<br>Emerging</div>
        </div>
        <div class="footer">Developer: <b>Meseret.T</b><br>ID: <b>1784/18</b></div>
    </div>

    </div>

<div id="pdf-overlay">
    <div class="pdf-nav">
        <span id="pdf-name">Viewer</span>
        <button class="close-btn" onclick="closePDF()">X ዝጋ</button>
    </div>
    <iframe id="pdf-frame"></iframe>
</div>

<script>
    function smartViewPDF(fileName) {
        const overlay = document.getElementById('pdf-overlay');
        const iframe = document.getElementById('pdf-frame');
        document.getElementById('pdf-name').innerText = fileName;

        // የፋይሉ ሙሉ አድራሻ (Github link)
        const fullUrl = `https://meseretmaru10-art.github.io/wollo-uni-kiot-modules/${fileName}`;

        if (navigator.onLine) {
            // ዳታ ካለ: በ Google Viewer ቀጥታ አፑ ውስጥ እንዲከፍት
            iframe.src = `https://docs.google.com/gview?embedded=true&url=${fullUrl}`;
            overlay.style.display = 'block';
            document.getElementById('app-body').style.display = 'none';
        } else {
            // ዳታ ከሌለ (Offline): በስልኩ የራሱ መንገድ እንዲከፍተው
            window.location.href = fileName;
        }
    }

    function closePDF() {
        document.getElementById('pdf-overlay').style.display = 'none';
        document.getElementById('app-body').style.display = 'block';
        document.getElementById('pdf-frame').src = "";
    }

    // Tab switching and Service Worker logic...
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
</script>
</body>
</html>
