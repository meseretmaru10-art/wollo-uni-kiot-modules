<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIOT Hub</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 70px; }
        .header { background: #456d80; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eef; }
        .footer { text-align: center; padding: 25px; background: #fff; border-top: 3px solid #456d80; margin-top: 30px; line-height: 1.8; }
        .footer b { color: #000; font-size: 1.1rem; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; z-index: 2000; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #888; font-weight: bold; cursor: pointer; }
        .nav-item.active-tab { color: #456d80; border-top: 4px solid #456d80; }
    </style>
</head>
<body>

<div class="header">Wollo University - KIOT Hub</div>

<div id="mod-page" class="page active">
    <div class="grid">
        <div class="card" onclick="viewPDF('maths.pdf')">📐<br>Maths</div>
        <div class="card" onclick="viewPDF('cpp.pdf')">💻<br>C++</div>
        <div class="card" onclick="viewPDF('english2.pdf')">📖<br>English II</div>
        <div class="card" onclick="viewPDF('history.pdf')">⏳<br>History</div>
        <div class="card" onclick="viewPDF('civics.pdf')">⚖️<br>Civics</div>
        <div class="card" onclick="viewPDF('anthropology.pdf')">🌍<br>Anthro</div>
        <div class="card" onclick="viewPDF('emerging.pdf')">🚀<br>Emerging</div>
    </div>
    <div class="footer">
        Developer: <b>Meseret.T</b><br>
        ID: <b>1784/18</b><br>
        <b>Wollo University - KIOT</b>
    </div>
</div>

<div id="gpa-page" class="page">
    <div style="background:white; padding:20px; border-radius:15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h3 style="text-align:center;">GPA Calculator</h3>
        <p style="text-align:center; color:#666;">የ freshman ተማሪዎች ውጤት ማስያ</p>
        <div id="gpa-inputs"></div>
        <button onclick="calcGPA()" style="width:100%; background:#456d80; color:white; padding:15px; border:none; border-radius:10px; margin-top:15px; font-weight:bold;">GPA አስላ</button>
        <h2 id="result" style="text-align:center; color:#456d80; margin-top:20px;"></h2>
    </div>
    <div class="footer">Developer: <b>Meseret.T</b><br>ID: <b>1784/18</b></div>
</div>

<div class="bottom-nav">
    <div class="nav-item active-tab" id="tab-mod" onclick="showTab('mod')">📚 Modules</div>
    <div class="nav-item" id="tab-gpa" onclick="showTab('gpa')">📊 GPA Calc</div>
</div>

<script>
    function showTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
        if(tab === 'mod') {
            document.getElementById('mod-page').classList.add('active');
            document.getElementById('tab-mod').classList.add('active-tab');
        } else {
            document.getElementById('gpa-page').classList.add('active');
            document.getElementById('tab-gpa').classList.add('active-tab');
        }
    }

    function viewPDF(fileName) {
        // የኢሜይል አካውንት ሳይጠይቅ ፋይሉን በቀጥታ የሚከፍትበት መንገድ
        const siteUrl = "https://meseretmaru10-art.github.io/" + fileName;
        window.open(siteUrl, "_blank");
    }

    const subjs = ["Maths", "C++", "English II", "History", "Civics", "Anthro", "Emerging"];
    const inputArea = document.getElementById('gpa-inputs');
    subjs.forEach(s => {
        inputArea.innerHTML += `<div style="margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <span>${s}</span>
            <div style="display:flex; gap:5px;">
                <select class="cr" style="padding:5px;"><option value="3">3 Cr</option><option value="4">4 Cr</option><option value="5">5 Cr</option></select>
                <select class="gr" style="padding:5px;"><option value="4">A</option><option value="3.75">A-</option><option value="3.5">B+</option><option value="3">B</option><option value="2">C</option><option value="0">F</option></select>
            </div>
        </div>`;
    });

    function calcGPA() {
        let tp = 0, tc = 0;
        let crs = document.querySelectorAll('.cr'), grs = document.querySelectorAll('.gr');
        for(let i=0; i<crs.length; i++) {
            tp += (parseFloat(crs[i].value) * parseFloat(grs[i].value));
            tc += parseFloat(crs[i].value);
        }
        document.getElementById('result').innerText = "GPA: " + (tp/tc).toFixed(2);
    }
</script>
</body>
</html>
