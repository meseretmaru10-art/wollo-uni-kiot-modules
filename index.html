<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIOT Hub</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 90px; }
        .header-logo { background: #456d80; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .header-logo img { width: 55px; border-radius: 50%; background: white; padding: 2px; }
        
        .page { display: none; padding: 15px; }
        .active { display: block; }

        /* Modules Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        
        /* GPA Styles */
        .gpa-card { background: white; padding: 20px; border-radius: 20px; }
        .gpa-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding-top: 15px; color: #888; font-weight: bold; }
        .active-tab { color: #456d80; border-top: 4px solid #456d80; background: #f9f9f9; }

        /* PDF Viewer Overlay */
        #pdf-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: #ff5252; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: bold; z-index: 4000; }
        iframe { width: 100%; height: 100%; border: none; }

        .footer { text-align: center; padding: 20px; margin-top: 20px; background: white; border-radius: 15px; }
        .id-badge { background: #ff5252; color: white; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div id="main-content">
    <div class="header-logo">
        <img src="icon.png" alt="Logo"><br>
        <strong>KIOT Hub</strong>
    </div>

    <div id="mod-page" class="page active">
        <div class="grid">
            <div class="card" onclick="viewPDF('maths.pdf')">📐<br>Maths</div>
            <div class="card" onclick="viewPDF('cpp.pdf')">💻<br>C++</div>
            <div class="card" onclick="viewPDF('english2.pdf')">📖<br>English II</div>
            <div class="card" onclick="viewPDF('history.pdf')">⏳<br>History</div>
            <div class="card" onclick="viewPDF('civics.pdf')">⚖️<br>Civics</div>
            <div class="card" onclick="viewPDF('anthropology.pdf')">🌍<br>Anthro</div>
            <div class="card" onclick="viewPDF('emerging.pdf')">🚀<br>Emerging</div>
        </div>
        <div class="footer">
            Developed by: <b>MESERET.T</b><br>
            <span class="id-badge">ID: 1784/18</span><br>
            <b>WOLLO KIOT</b>
        </div>
    </div>

    <div id="gpa-page" class="page">
        <div class="gpa-card">
            <h3 style="text-align:center;">GPA Calculator</h3>
            <div id="gpa-inputs"></div>
            <button onclick="calcGPA()" style="width:100%; padding:15px; background:#456d80; color:white; border:none; border-radius:10px; font-weight:bold; margin-top:15px;">GPA አስላ</button>
            <div id="gpa-res" style="text-align:center; font-size:24px; font-weight:bold; margin-top:15px; color:#456d80;">GPA: 0.00</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active-tab" id="tab-mod" onclick="showTab('mod')">📚 Modules</div>
        <div class="nav-item" id="tab-gpa" onclick="showTab('gpa')">📊 GPA Calc</div>
    </div>
</div>

<div id="pdf-overlay">
    <button class="close-btn" onclick="closePDF()">X</button>
    <iframe id="pdf-frame" src=""></iframe>
</div>

<script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    function showTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
        if(tab === 'mod') {
            document.getElementById('mod-page').classList.add('active');
            document.getElementById('tab-mod').classList.add('active-tab');
        } else {
            document.getElementById('gpa-page').classList.add('active');
            document.getElementById('tab-gpa').classList.add('active-tab');
        }
    }

    function viewPDF(fileName) {
        const overlay = document.getElementById('pdf-overlay');
        const iframe = document.getElementById('pdf-frame');
        
        // በቀጥታ ፋይሉን እንዲከፍት ተስተካክሏል (ያለ Google Viewer)
        iframe.src = fileName;
        
        overlay.style.display = 'block';
        document.getElementById('main-content').style.display = 'none';
        window.history.pushState({ pdfOpen: true }, "");
    }

    function closePDF() {
        document.getElementById('pdf-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('pdf-frame').src = "";
    }

    window.onpopstate = function() { closePDF(); };

    const courses = ["Maths", "C++", "English II", "History", "Civics", "Anthro", "Emerging"];
    const container = document.getElementById('gpa-inputs');
    
    courses.forEach(c => {
        container.innerHTML += `
        <div class="gpa-row">
            <b>${c}</b>
            <div style="display:flex; gap:5px;">
                <select class="cr">
                    <option value="3">3 Cr</option><option value="4">4 Cr</option><option value="5">5 Cr</option>
                </select>
                <select class="gr">
                    <option value="4">A+</option><option value="4">A</option><option value="3.75">A-</option>
                    <option value="3.5">B+</option><option value="3">B</option><option value="2.75">B-</option>
                    <option value="2.5">C+</option><option value="2">C</option><option value="1.75">C-</option>
                    <option value="1.5">D+</option><option value="1">D</option><option value="0">F</option>
                </select>
            </div>
        </div>`;
    });

    function calcGPA() {
        let tp = 0, tc = 0;
        const crs = document.querySelectorAll('.cr');
        const grs = document.querySelectorAll('.gr');
        for (let i = 0; i < crs.length; i++) {
            tp += (parseFloat(crs[i].value) * parseFloat(grs[i].value));
            tc += parseFloat(crs[i].value);
        }
        document.getElementById('gpa-res').innerText = "GPA: " + (tp / tc).toFixed(2);
    }
</script>
</body>
</html>
