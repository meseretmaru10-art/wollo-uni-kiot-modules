<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIOT Freshman Hub</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 70px; }
        .header { background: #456d80; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .footer { text-align: center; padding: 20px; background: #fff; border-top: 2px solid #456d80; margin-top: 20px; font-size: 0.9rem; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 60px; }
        .nav-item { flex: 1; text-align: center; padding: 10px; color: #888; font-weight: bold; cursor: pointer; }
        .nav-item.active-tab { color: #456d80; border-top: 3px solid #456d80; }
        table { width: 100%; margin-top: 10px; }
        select { width: 100%; padding: 5px; border-radius: 5px; }
        .calc-btn { width: 100%; background: #456d80; color: white; border: none; padding: 12px; margin-top: 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">Wollo University - KIOT Hub</div>

<div id="mod-page" class="page active">
    <div class="grid">
        <div class="card" onclick="viewPDF('maths.pdf')">📐<br>Maths</div>
        <div class="card" onclick="viewPDF('cpp.pdf')">💻<br>C++</div>
        <div class="card" onclick="viewPDF('english2.pdf')">📖<br>English II</div>
        <div class="card" onclick="viewPDF('history.pdf')">⏳<br>History</div>
        <div class="card" onclick="viewPDF('civics.pdf')">⚖️<br>Civics</div>
        <div class="card" onclick="viewPDF('anthropology.pdf')">🌍<br>Anthro</div>
        <div class="card" onclick="viewPDF('emerging.pdf')">🚀<br>Emerging</div>
    </div>
    <div class="footer">Developer: <b>Meseret.T</b><br>ID: <b>1784/18</b><br><b>KIOT Freshman</b></div>
</div>

<div id="gpa-page" class="page">
    <div style="background:white; padding:15px; border-radius:12px;">
        <h3 style="text-align:center;">GPA Calculator</h3>
        <table id="gpa-table"></table>
        <button class="calc-btn" onclick="calcGPA()">GPA አስላ</button>
        <h2 id="gpa-res" style="text-align:center; color:#456d80;"></h2>
    </div>
    <div class="footer">Developer: <b>Meseret.T</b><br>ID: <b>1784/18</b></div>
</div>

<div class="bottom-nav">
    <div class="nav-item active-tab" id="tab-mod" onclick="showTab('mod')">📚 Modules</div>
    <div class="nav-item" id="tab-gpa" onclick="showTab('gpa')">📊 GPA Calc</div>
</div>

<script>
    function showTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
        if(tab === 'mod') {
            document.getElementById('mod-page').classList.add('active');
            document.getElementById('tab-mod').classList.add('active-tab');
        } else {
            document.getElementById('gpa-page').classList.add('active');
            document.getElementById('tab-gpa').classList.add('active-tab');
        }
    }

    function viewPDF(fileName) {
        const user = "meseretmaru10-art";
        const repo = "wollo-uni-kiot-modules"; 
        const link = `https://raw.githubusercontent.com/${user}/${repo}/main/${fileName}`;
        window.open(link, "_blank");
    }

    const courses = ["Maths", "C++", "English II", "History", "Civics", "Anthro", "Emerging"];
    const tbody = document.getElementById('gpa-table');
    courses.forEach(c => {
        tbody.innerHTML += `<tr><td><b>${c}</b></td>
        <td><select class="cr"><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></td>
        <td><select class="gr"><option value="4">A</option><option value="3.5">B+</option><option value="3">B</option><option value="2">C</option><option value="0">F</option></select></td></tr>`;
    });

    function calcGPA() {
        let tp = 0, tc = 0;
        let crs = document.querySelectorAll('.cr'), grs = document.querySelectorAll('.gr');
        for(let i=0; i<crs.length; i++) {
            tp += (parseFloat(crs[i].value) * parseFloat(grs[i].value));
            tc += parseFloat(crs[i].value);
        }
        document.getElementById('gpa-res').innerText = "GPA: " + (tp/tc).toFixed(2);
    }
</script>
</body>
</html>
