<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIOT Hub - Wollo University</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 80px; overflow-x: hidden; }
        .header { background: #456d80; color: white; padding: 18px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eef; }
        .card:active { transform: scale(0.95); }

        #pdf-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: #ff5252; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; z-index: 3001; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        .gpa-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .gpa-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 8px; border-bottom: 1px solid #f0f0f0; }
        .gpa-row b { font-size: 14px; color: #333; flex: 1; }
        .selectors { display: flex; gap: 5px; flex: 2; justify-content: flex-end; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 13px; }
        .calc-btn { width: 100%; background: #456d80; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; font-size: 16px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 65px; z-index: 2000; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #888; font-weight: bold; cursor: pointer; font-size: 14px; }
        .nav-item.active-tab { color: #456d80; border-top: 4px solid #456d80; background: #f9fbfc; }
        .footer { text-align: center; padding: 25px; background: #fff; border-top: 3px solid #456d80; margin-top: 30px; font-size: 0.85rem; color: #555; }
    </style>
</head>
<body>

<div id="main-content">
    <div class="header">Wollo University - KIOT Hub</div>

    <div id="mod-page" class="page active">
        <div class="grid">
            <div class="card" onclick="viewPDF('maths.pdf')">📐<br>Maths</div>
            <div class="card" onclick="viewPDF('cpp.pdf')">💻<br>C++</div>
            <div class="card" onclick="viewPDF('english2.pdf')">📖<br>English II</div>
            <div class="card" onclick="viewPDF('history.pdf')">⏳<br>History</div>
            <div class="card" onclick="viewPDF('civics.pdf')">⚖️<br>Civics</div>
            <div class="card" onclick="viewPDF('anthropology.pdf')">🌍<br>Anthro</div>
            <div class="card" onclick="viewPDF('emerging.pdf')">🚀<br>Emerging</div>
        </div>
        <div class="footer">Developed by: <b>Meseret.T</b><br>ID: <b>1784/18</b></div>
    </div>

    <div id="gpa-page" class="page">
        <div class="gpa-card">
            <h3 style="text-align:center; color:#456d80;">GPA Calculator</h3>
            <div id="gpa-inputs"></div>
            <button class="calc-btn" onclick="calcGPA()">GPA አስላ (Calculate)</button>
            <h2 id="gpa-res" style="text-align:center; color:#456d80; margin-top:15px;">GPA: 0.00</h2>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active-tab" id="tab-mod" onclick="showTab('mod')">📚 Modules</div>
        <div class="nav-item" id="tab-gpa" onclick="showTab('gpa')">📊 GPA Calc</div>
    </div>
</div>

<div id="pdf-overlay">
    <button class="close-btn" onclick="closePDF()">X</button>
    <iframe id="pdf-frame" src=""></iframe>
</div>

<script>
    function showTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
        if(tab === 'mod') {
            document.getElementById('mod-page').classList.add('active');
            document.getElementById('tab-mod').classList.add('active-tab');
        } else {
            document.getElementById('gpa-page').classList.add('active');
            document.getElementById('tab-gpa').classList.add('active-tab');
        }
    }

    function viewPDF(fileName) {
        const overlay = document.getElementById('pdf-overlay');
        const iframe = document.getElementById('pdf-frame');
        const main = document.getElementById('main-content');
        iframe.src = "./" + fileName; 
        overlay.style.display = 'block';
        main.style.display = 'none';
        window.history.pushState({ pdfOpen: true }, "");
    }

    function closePDF() {
        document.getElementById('pdf-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('pdf-frame').src = "";
    }

    window.onpopstate = function() { closePDF(); };

    const courses = ["Maths", "C++", "English II", "History", "Civics", "Anthro", "Emerging"];
    const container = document.getElementById('gpa-inputs');
    
    courses.forEach(c => {
        container.innerHTML += `
        <div class="gpa-row">
            <b>${c}</b>
            <div class="selectors">
                <select class="cr">
                    <option value="3">3 Cr</option>
                    <option value="4">4 Cr</option>
                    <option value="5">5 Cr</option>
                </select>
                <select class="gr">
                    <option value="4">A+</option><option value="4">A</option><option value="3.75">A-</option>
                    <option value="3.5">B+</option><option value="3">B</option><option value="2.75">B-</option>
                    <option value="2.5">C+</option><option value="2">C</option><option value="1.75">C-</option>
                    <option value="1.5">D+</option><option value="1">D</option><option value="0">F</option>
                </select>
            </div>
        </div>`;
    });

    function calcGPA() {
        let tp = 0, tc = 0;
        const crs = document.querySelectorAll('.cr');
        const grs = document.querySelectorAll('.gr');
        for (let i = 0; i < crs.length; i++) {
            let creditValue = parseFloat(crs[i].value); // ተማሪው የመረጠው ክሬዲት (3, 4, 5)
            let gradeValue = parseFloat(grs[i].value);  // ተማሪው የመረጠው ውጤት
            tp += (creditValue * gradeValue);
            tc += creditValue;
        }
        document.getElementById('gpa-res').innerText = "GPA: " + (tp / tc).toFixed(2);
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
</script>
</body>
</html>
