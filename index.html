<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIOT Hub</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 80px; }
        .header { background: #456d80; color: white; padding: 18px; text-align: center; font-weight: bold; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        
        #pdf-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 10px; right: 10px; padding: 10px; background: red; color: white; border: none; cursor: pointer; z-index: 6000; }

        .gpa-card { background: white; padding: 15px; border-radius: 15px; }
        .gpa-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .calc-btn { width: 100%; padding: 15px; background: #456d80; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">Wollo University - KIOT Hub</div>

<div id="mod-page" class="page active">
    <div class="grid">
        <div class="card" onclick="viewPDF('maths.pdf')">📐 Maths</div>
        <div class="card" onclick="viewPDF('cpp.pdf')">💻 C++</div>
        <div class="card" onclick="viewPDF('english2.pdf')">📖 English II</div>
    </div>
</div>

<div id="gpa-page" class="page">
    <div class="gpa-card">
        <h3>GPA Calculator</h3>
        <div id="gpa-inputs"></div>
        <button class="calc-btn" onclick="calcGPA()">GPA አስላ</button>
        <h2 id="gpa-res">GPA: 0.00</h2>
    </div>
</div>

<div style="position:fixed; bottom:0; width:100%; background:white; display:flex;">
    <button onclick="showTab('mod')" style="flex:1; padding:15px;">Modules</button>
    <button onclick="showTab('gpa')" style="flex:1; padding:15px;">GPA Calc</button>
</div>

<div id="pdf-overlay">
    <button class="close-btn" onclick="closePDF()">X ዝጋ</button>
    <iframe id="pdf-frame"></iframe>
</div>

<script>
    function showTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(tab + '-page').style.display = 'block';
    }

    function viewPDF(fileName) {
        document.getElementById('pdf-overlay').style.display = 'block';
        document.getElementById('pdf-frame').src = fileName;
    }

    function closePDF() { document.getElementById('pdf-overlay').style.display = 'none'; }

    // GPA Logic
    const courses = ["Maths", "C++", "English II"];
    const container = document.getElementById('gpa-inputs');
    courses.forEach(c => {
        container.innerHTML += `<div class="gpa-row"><b>${c}</b>
            <select class="cr"><option value="3">3</option><option value="4">4</option></select>
            <select class="gr"><option value="4">A</option><option value="3">B</option><option value="2">C</option></select>
        </div>`;
    });

    function calcGPA() {
        let tp = 0, tc = 0;
        document.querySelectorAll('.gpa-row').forEach(row => {
            let c = parseFloat(row.querySelector('.cr').value);
            let g = parseFloat(row.querySelector('.gr').value);
            tp += (c * g);
            tc += c;
        });
        document.getElementById('gpa-res').innerText = "GPA: " + (tp/tc).toFixed(2);
    }
</script>
</body>
</html>
